automation:
  - id: evening_schedule
    alias: Расписание — Вечер
    description: Запускает сценарий «Вечер» по недельному расписанию из приложения
    trigger:
      - platform: time_pattern
        minutes: "/1"
    condition:
      - condition: template
        value_template: >
          {% set raw = states('input_text.evening_schedule') %}
          {% if raw in ['unknown', 'unavailable', ''] %}false
          {% else %}
            {% set s = raw | from_json(default={}) %}
            {% if not s.get('enabled', false) %}false
            {% else %}
              {% set days = ['mon','tue','wed','thu','fri','sat','sun'] %}
              {% set day = days[now().weekday()] %}
              {% set d = s.get('weekdays', {}).get(day, none) %}
              {% if d is none %}false
              {% elif d is mapping %}
                {{ d.get('enabled', false) and d.get('time', '') == now().strftime('%H:%M') }}
              {% else %}
                {{ d[0] and d[1] == now().strftime('%H:%M') }}
              {% endif %}
            {% endif %}
          {% endif %}
    action:
      - service: script.turn_on
        target:
          entity_id: script.evening
    mode: single

