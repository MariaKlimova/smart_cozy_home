    max: 512

input_number:
  # Вечер
  evening_brightness:
    name: Яркость вечером (%)
    initial: 15
    min: 1
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-4

  evening_temperature:
    name: Температура вечером (°C)
    initial: 18
    min: 16
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  # Сон
  sleep_temperature:
    name: Ночная температура (°C)
    initial: 17
    min: 15
    max: 22
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-minus

  sleep_nightlight_brightness:
    name: Яркость ночника во время сна (%)
    initial: 8
    min: 1
    max: 30
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-4

  # Утро
  morning_brightness:
    name: Дневная яркость (%)
    initial: 80
    min: 10
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-7

  morning_warmup_minutes:
    name: Время плавного пробуждения (мин)
    initial: 20
    min: 5
    max: 60
    step: 5
    unit_of_measurement: "мин"
    icon: mdi:timer-outline

  # Уехали
  away_temperature:
    name: Температура при отъезде (°C)
    initial: 16
    min: 12
    max: 20
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low

  # Еду домой
  coming_home_minutes:
    name: За сколько минут нажать (мин)
    initial: 20
    min: 5
    max: 60
    step: 5
    unit_of_measurement: "мин"
    icon: mdi:car-clock

  coming_home_temperature:
    name: Температура встречи (°C)
    initial: 21
    min: 18
    max: 25
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-plus

  coming_home_brightness:
    name: Яркость встречи (%)
    initial: 60
    min: 10
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-5

  # Уют
  cozy_brightness:
    name: Яркость уюта (%)
    initial: 40
    min: 5
    max: 80
    step: 5
    unit_of_measurement: "%"
    icon: mdi:candle

  cozy_temperature:
    name: Температура уюта (°C)
    initial: 21
    min: 18
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  # Фокус
  focus_brightness:
    name: Яркость фокуса (%)
    initial: 90
    min: 50
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:brightness-7

  focus_temperature:
    name: Рабочая температура (°C)
    initial: 19
    min: 17
    max: 22
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer
