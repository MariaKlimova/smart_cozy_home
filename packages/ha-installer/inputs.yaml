input_select:
  home_mode:
    name: Режим дома
    options:
      - none
      - evening
      - sleep
      - morning
      - away
      - cozy
      - focus
    initial: none
    icon: mdi:home

input_boolean:
  home_ready_for_arrival:
    name: Дом готов к прибытию
    initial: false
    icon: mdi:home-import-outline

  # Параметры сценариев
  evening_curtains:
    name: Закрывать шторы вечером
    initial: true
    icon: mdi:curtains

  evening_humidifier:
    name: Включать увлажнитель вечером
    initial: true
    icon: mdi:air-humidifier

  sleep_window:
    name: Открывать окно во время сна
    initial: false
    icon: mdi:window-open

  sleep_nightlight:
    name: Включать ночник во время сна
    initial: true
    icon: mdi:lightbulb-night

  away_curtains:
    name: Закрывать шторы при отъезде
    initial: true
    icon: mdi:curtains

input_text:
  evening_schedule:
    name: Расписание вечера (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":{"enabled":false,"time":"22:30"},"tue":{"enabled":false,"time":"22:30"},"wed":{"enabled":false,"time":"22:30"},"thu":{"enabled":false,"time":"22:30"},"fri":{"enabled":false,"time":"22:30"},"sat":{"enabled":false,"time":"22:30"},"sun":{"enabled":false,"time":"22:30"}}}'
    max: 512

  sleep_schedule:
    name: Расписание сна (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":{"enabled":false,"time":"23:00"},"tue":{"enabled":false,"time":"23:00"},"wed":{"enabled":false,"time":"23:00"},"thu":{"enabled":false,"time":"23:00"},"fri":{"enabled":false,"time":"23:00"},"sat":{"enabled":false,"time":"23:00"},"sun":{"enabled":false,"time":"23:00"}}}'
