    max: 512

  away_schedule:
    name: Расписание «Уехали» (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":{"enabled":false,"time":"08:00"},"tue":{"enabled":false,"time":"08:00"},"wed":{"enabled":false,"time":"08:00"},"thu":{"enabled":false,"time":"08:00"},"fri":{"enabled":false,"time":"08:00"},"sat":{"enabled":false,"time":"08:00"},"sun":{"enabled":false,"time":"08:00"}}}'
