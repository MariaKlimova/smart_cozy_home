input_select:
  home_mode:
    name: Режим дома
    options:
      - none
      - evening
      - sleep
      - morning
      - away
      - cozy
      - focus
    initial: none
    icon: mdi:home

input_boolean:
  home_ready_for_arrival:
    name: Дом готов к прибытию
    initial: false
    icon: mdi:home-import-outline

  # Параметры сценариев
  evening_curtains:
    name: Закрывать шторы вечером
    initial: true
    icon: mdi:curtains

  evening_humidifier:
    name: Включать увлажнитель вечером
    initial: true
    icon: mdi:air-humidifier

  sleep_window:
    name: Открывать окно во время сна
    initial: false
    icon: mdi:window-open

  sleep_nightlight:
    name: Включать ночник во время сна
    initial: true
    icon: mdi:lightbulb-night

  away_curtains:
    name: Закрывать шторы при отъезде
    initial: true
    icon: mdi:curtains

# max: 255 — лимит HA для input_text. JSON компактный: day → [enabled, "HH:mm"]
input_text:
  evening_schedule:
    name: Расписание вечера (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":[false,"22:30"],"tue":[false,"22:30"],"wed":[false,"22:30"],"thu":[false,"22:30"],"fri":[false,"22:30"],"sat":[false,"22:30"],"sun":[false,"22:30"]}}'
    max: 255

  sleep_schedule:
    name: Расписание сна (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":[false,"23:00"],"tue":[false,"23:00"],"wed":[false,"23:00"],"thu":[false,"23:00"],"fri":[false,"23:00"],"sat":[false,"23:00"],"sun":[false,"23:00"]}}'
    max: 255

  # Компактный HA payload для light.turn_on: rgb_color / hs_color / color_temp_kelvin / …
  sleep_nightlight_color:
    name: Цвет ночника во время сна (JSON)
    initial: '{"rgb_color":[242,145,61]}'
    max: 255
    icon: mdi:palette

  morning_schedule:
    name: Расписание утра (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":[false,"07:00"],"tue":[false,"07:00"],"wed":[false,"07:00"],"thu":[false,"07:00"],"fri":[false,"07:00"],"sat":[false,"07:00"],"sun":[false,"07:00"]}}'
    max: 255

  away_schedule:
    name: Расписание «Уехали» (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":[false,"08:00"],"tue":[false,"08:00"],"wed":[false,"08:00"],"thu":[false,"08:00"],"fri":[false,"08:00"],"sat":[false,"08:00"],"sun":[false,"08:00"]}}'
    max: 255

  coming_home_schedule:
    name: Расписание «Еду домой» (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":[false,"18:00"],"tue":[false,"18:00"],"wed":[false,"18:00"],"thu":[false,"18:00"],"fri":[false,"18:00"],"sat":[false,"18:00"],"sun":[false,"18:00"]}}'
    max: 255

  cozy_schedule:
    name: Расписание «Уют» (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":[false,"20:00"],"tue":[false,"20:00"],"wed":[false,"20:00"],"thu":[false,"20:00"],"fri":[false,"20:00"],"sat":[false,"20:00"],"sun":[false,"20:00"]}}'
    max: 255

  focus_schedule:
    name: Расписание «Фокус» (JSON)
    initial: '{"version":1,"enabled":false,"weekdays":{"mon":[false,"09:00"],"tue":[false,"09:00"],"wed":[false,"09:00"],"thu":[false,"09:00"],"fri":[false,"09:00"],"sat":[false,"09:00"],"sun":[false,"09:00"]}}'
    max: 255

input_number:
  # Вечер
  evening_brightness:
    name: Яркость вечером (%)
    initial: 15
    min: 1
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-4

  evening_temperature:
    name: Температура вечером (°C)
    initial: 18
    min: 16
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  # Сон
  sleep_temperature:
    name: Ночная температура (°C)
    initial: 17
    min: 15
    max: 22
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-minus

  sleep_nightlight_brightness:
    name: Яркость ночника во время сна (%)
    initial: 8
    min: 1
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-4

  # Утро
  morning_brightness:
    name: Дневная яркость (%)
    initial: 80
    min: 10
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-7

  morning_warmup_minutes:
    name: Время плавного пробуждения (мин)
    initial: 20
    min: 5
    max: 60
    step: 5
    unit_of_measurement: "мин"
    icon: mdi:timer-outline

  # Уехали
  away_temperature:
    name: Температура при отъезде (°C)
    initial: 16
    min: 12
    max: 20
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low

  # Еду домой
  coming_home_minutes:
    name: За сколько минут нажать (мин)
    initial: 20
    min: 5
    max: 60
    step: 5
    unit_of_measurement: "мин"
    icon: mdi:car-clock

  coming_home_temperature:
    name: Температура встречи (°C)
    initial: 21
    min: 18
    max: 25
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-plus

  coming_home_brightness:
    name: Яркость встречи (%)
    initial: 60
    min: 10
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:brightness-5

  # Уют
  cozy_brightness:
    name: Яркость уюта (%)
    initial: 40
    min: 5
    max: 80
    step: 5
    unit_of_measurement: "%"
    icon: mdi:candle

  cozy_temperature:
    name: Температура уюта (°C)
    initial: 21
    min: 18
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  # Фокус
  focus_brightness:
    name: Яркость фокуса (%)
    initial: 90
    min: 50
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:brightness-7

  focus_temperature:
    name: Рабочая температура (°C)
    initial: 19
    min: 17
    max: 22
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer
