# Режим/prepared ставим в начале; действия с устройствами — с continue_on_error,
# чтобы сценарий не падал, пока entity ещё не смаплены.
script:
  bedroom_humidifier_on:
    alias: Увлажнитель — вкл
    description: Включает humidifier.bedroom или фолбек switch.bedroom_humidifier (SH-37)
    mode: single
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('humidifier.bedroom') not in ['unknown', 'unavailable', ''] }}"
            sequence:
              - continue_on_error: true
                service: homeassistant.turn_on
                target:
                  entity_id: humidifier.bedroom
          - conditions:
              - condition: template
                value_template: "{{ states('switch.bedroom_humidifier') not in ['unknown', 'unavailable', ''] }}"
            sequence:
              - continue_on_error: true
                service: homeassistant.turn_on
                target:
                  entity_id: switch.bedroom_humidifier
        default: []

  bedroom_humidifier_off:
    alias: Увлажнитель — выкл
    description: Выключает humidifier.bedroom или фолбек switch.bedroom_humidifier (SH-37)
    mode: single
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('humidifier.bedroom') not in ['unknown', 'unavailable', ''] }}"
            sequence:
              - continue_on_error: true
                service: homeassistant.turn_off
                target:
                  entity_id: humidifier.bedroom
          - conditions:
              - condition: template
                value_template: "{{ states('switch.bedroom_humidifier') not in ['unknown', 'unavailable', ''] }}"
            sequence:
              - continue_on_error: true
                service: homeassistant.turn_off
                target:
                  entity_id: switch.bedroom_humidifier
        default: []

  # logical % → brightness_pct в [bedroom_light_visible_min, 100].
  # Синхрон с mapLogicalToDevicePct в apps/mobile.
  bedroom_set_light_logical:
    alias: Свет спальни — логическая яркость
    description: Ставит light.bedroom по логическому % с учётом порога видимости
    mode: parallel
    fields:
      brightness_logical:
        name: Логическая яркость
        required: true
        selector:
          number:
            min: 0
            max: 100
            step: 1
            unit_of_measurement: "%"
    sequence:
      - continue_on_error: true
        service: light.turn_on
        target:
          entity_id: light.bedroom
        data:
          brightness_pct: >-
            {% set floor = states('input_number.bedroom_light_visible_min') | int(0) %}
            {% set logical = brightness_logical | int(0) %}
            {{ (floor + (logical / 100) * (100 - floor)) | round | int }}

  evening:
    alias: Вечер
    description: Подготовка ко сну — плавно гасит свет, закрывает шторы, снижает температуру
    icon: mdi:weather-night
    sequence:
      - alias: Фиксируем режим
        service: input_select.select_option
        target:
          entity_id: input_select.home_mode
        data:
          option: evening

      - alias: Выключаем ночник
        continue_on_error: true
        service: light.turn_off
        target:
          entity_id: light.bedroom_nightlight

      # Без transition/color_temp: у многих ламп ломают вызов (ручной тест подтвердил).
      - alias: Гасим свет
        continue_on_error: true
        service: script.bedroom_set_light_logical
        data:
          brightness_logical: "{{ states('input_number.evening_brightness') | int(15) }}"

      - alias: Закрываем шторы если нужно
        if:
          - condition: state
            entity_id: input_boolean.evening_curtains
            state: "on"
        then:
          - continue_on_error: true
            service: cover.close_cover
            target:
              entity_id: cover.bedroom_curtains

      - alias: Устанавливаем температуру
        continue_on_error: true
        service: climate.set_temperature
        target:
          entity_id:
            - climate.bedroom_ac
            - climate.bedroom_radiator
            - climate.bedroom_ventilation
        data:
          temperature: "{{ states('input_number.evening_temperature') | float }}"

      - alias: Включаем увлажнитель если нужно
        if:
          - condition: state
            entity_id: input_boolean.evening_humidifier
            state: "on"
        then:
          - continue_on_error: true
            service: script.turn_on
            target:
              entity_id: script.bedroom_humidifier_on

  sleep:
    alias: Сон
    description: Финальное выключение — гасит основной свет, опционально ночник и окно
    icon: mdi:bed
    sequence:
      - alias: Фиксируем режим
        service: input_select.select_option
        target:
          entity_id: input_select.home_mode
        data:
          option: sleep

      - alias: Выключаем основной свет
        continue_on_error: true
        service: light.turn_off
        target:
          entity_id: light.bedroom

      - alias: Ночник — включить или выключить
        if:
          - condition: state
            entity_id: input_boolean.sleep_nightlight
            state: "on"
        then:
          - alias: Включаем ночник (яркость)
            continue_on_error: true
            service: light.turn_on
            target:
              entity_id: light.bedroom_nightlight
            data:
              brightness_pct: "{{ states('input_number.sleep_nightlight_brightness') | int }}"
          - alias: Задаём цвет ночника если настроен
            continue_on_error: true
            if:
              - condition: template
                value_template: >
                  {% set raw = states('input_text.sleep_nightlight_color') %}
                  {% if raw in ['unknown', 'unavailable', 'none', ''] %}
                    false
                  {% else %}
                    {% set c = raw | from_json %}
                    {{ c is mapping and (
                         c.rgb_color is defined or
                         c.hs_color is defined or
                         c.color_temp_kelvin is defined or
                         c.rgbw_color is defined or
                         c.rgbww_color is defined
                       ) }}
                  {% endif %}
            then:
              - service: light.turn_on
                target:
                  entity_id: light.bedroom_nightlight
                data: >
                  {{ dict(
                       {'brightness_pct': states('input_number.sleep_nightlight_brightness') | int},
                       states('input_text.sleep_nightlight_color') | from_json
                     ) }}
        else:
          - continue_on_error: true
            service: light.turn_off
            target:
              entity_id: light.bedroom_nightlight

      - alias: Открываем окно если нужно
        if:
          - condition: state
            entity_id: input_boolean.sleep_window
            state: "on"
        then:
          - continue_on_error: true
            service: cover.open_cover
            target:
              entity_id: cover.bedroom_window

      - alias: Устанавливаем ночную температуру
        continue_on_error: true
        service: climate.set_temperature
        target:
          entity_id:
            - climate.bedroom_ac
            - climate.bedroom_radiator
            - climate.bedroom_ventilation
        data:
          temperature: "{{ states('input_number.sleep_temperature') | float }}"

  morning:
    alias: Утро
    description: Мягкое пробуждение — плавно поднимает яркость и открывает шторы
    icon: mdi:weather-sunny
    # Длинный софтовый ramp; повторный запуск сбрасывает предыдущий подъём
    mode: restart
    sequence:
      - alias: Фиксируем режим
        service: input_select.select_option
        target:
          entity_id: input_select.home_mode
        data:
          option: morning

      - alias: Выключаем ночник
        continue_on_error: true
        service: light.turn_off
        target:
          entity_id: light.bedroom_nightlight

      - alias: Закрываем окно
        continue_on_error: true
        service: cover.close_cover
        target:
          entity_id: cover.bedroom_window

      # Hardware transition на light.bedroom ломает вызов — soft ramp через script.bedroom_set_light_logical.
      - alias: Параметры подъёма света
        variables:
          morning_target_pct: "{{ states('input_number.morning_brightness') | int(80) }}"
          morning_warmup_min: "{{ states('input_number.morning_warmup_minutes') | int(20) }}"
          morning_ramp_steps: "{{ [morning_warmup_min | int, 1] | max }}"
          morning_ramp_delay_sec: >-
            {{
              (
                (morning_warmup_min | float) * 60
                / ([morning_ramp_steps | int - 1, 1] | max)
              ) | int
            }}

      - alias: Включаем свет (первый шаг)
        continue_on_error: true
        service: script.bedroom_set_light_logical
        data:
          brightness_logical: >-
            {{
              [
                ((1 / (morning_ramp_steps | int)) * (morning_target_pct | int)) | round(0, 'ceil'),
                1
              ] | max | int
            }}

      - alias: Открываем шторы
        continue_on_error: true
        service: cover.open_cover
        target:
          entity_id: cover.bedroom_curtains

      - alias: Устанавливаем дневную температуру
        continue_on_error: true
        service: climate.set_temperature
        target:
          entity_id:
            - climate.bedroom_ac
            - climate.bedroom_radiator
            - climate.bedroom_ventilation
        data:
          temperature: 21

      - alias: Плавный подъём яркости
        if:
          - condition: template
            value_template: "{{ morning_ramp_steps | int > 1 }}"
        then:
          - repeat:
              count: "{{ morning_ramp_steps | int - 1 }}"
              sequence:
                - delay:
                    seconds: "{{ morning_ramp_delay_sec | int }}"
                - continue_on_error: true
                  service: script.bedroom_set_light_logical
                  data:
                    brightness_logical: >-
                      {{
                        [
                          (((repeat.index + 1) / (morning_ramp_steps | int)) * (morning_target_pct | int)) | round(0, 'ceil'),
                          morning_target_pct | int
                        ] | min | int
                      }}

  away:
    alias: Уехали
    description: Переводит дом в режим ожидания — выключает всё и снижает температуру
    icon: mdi:door-closed
    sequence:
      - alias: Фиксируем режим
        service: input_select.select_option
        target:
          entity_id: input_select.home_mode
        data:
          option: away

      - alias: Сбрасываем подготовку к прибытию
        service: input_boolean.turn_off
        target:
          entity_id: input_boolean.home_ready_for_arrival

      - alias: Выключаем свет
        continue_on_error: true
        service: light.turn_off
        target:
          entity_id:
            - light.bedroom
            - light.living_room
            - light.bedroom_nightlight

      - alias: Закрываем шторы если нужно
        if:
          - condition: state
            entity_id: input_boolean.away_curtains
            state: "on"
        then:
          - continue_on_error: true
            service: cover.close_cover
            target:
              entity_id: cover.bedroom_curtains

      - alias: Закрываем окно
        continue_on_error: true
        service: cover.close_cover
        target:
          entity_id: cover.bedroom_window

      - alias: Снижаем температуру
        continue_on_error: true
        service: climate.set_temperature
        target:
          entity_id:
            - climate.bedroom_ac
            - climate.bedroom_radiator
            - climate.bedroom_ventilation
        data:
          temperature: "{{ states('input_number.away_temperature') | float }}"

      - alias: Выключаем увлажнитель
        continue_on_error: true
        service: script.turn_on
        target:
          entity_id: script.bedroom_humidifier_off

  coming_home:
    alias: Еду домой
    description: Готовит дом к прибытию — прогревает и включает свет
    icon: mdi:car
    sequence:
      - alias: Фиксируем готовность
        service: input_boolean.turn_on
        target:
          entity_id: input_boolean.home_ready_for_arrival

      - alias: Сбрасываем режим дома
        service: input_select.select_option
        target:
          entity_id: input_select.home_mode
        data:
          option: none

      - alias: Выключаем ночник
        continue_on_error: true
        service: light.turn_off
        target:
          entity_id: light.bedroom_nightlight

      - alias: Включаем увлажнитель
        continue_on_error: true
        service: script.turn_on
        target:
          entity_id: script.bedroom_humidifier_on

      - alias: Прогреваем до нужной температуры
        continue_on_error: true
        service: climate.set_temperature
        target:
          entity_id:
            - climate.bedroom_ac
            - climate.bedroom_radiator
            - climate.bedroom_ventilation
        data:
          temperature: "{{ states('input_number.coming_home_temperature') | float }}"

      - alias: Включаем тёплый встречный свет
        continue_on_error: true
        service: script.bedroom_set_light_logical
        data:
          brightness_logical: "{{ states('input_number.coming_home_brightness') | int(60) }}"

      - alias: Открываем шторы если день
        if:
          - condition: state
            entity_id: sun.sun
            state: above_horizon
        then:
          - continue_on_error: true
            service: cover.open_cover
            target:
              entity_id: cover.bedroom_curtains

  cozy:
    alias: Уют
    description: Расслабленный вечер — тёплый мягкий свет, комфортная температура
    icon: mdi:sofa
    sequence:
      - alias: Фиксируем режим
        service: input_select.select_option
        target:
          entity_id: input_select.home_mode
        data:
          option: cozy

      - alias: Выключаем ночник
        continue_on_error: true
        service: light.turn_off
        target:
          entity_id: light.bedroom_nightlight

      - alias: Включаем тёплый мягкий свет
        continue_on_error: true
        service: script.bedroom_set_light_logical
        data:
          brightness_logical: "{{ states('input_number.cozy_brightness') | int(40) }}"

      - alias: Закрываем шторы
        continue_on_error: true
        service: cover.close_cover
        target:
          entity_id: cover.bedroom_curtains

      - alias: Устанавливаем температуру уюта
        continue_on_error: true
        service: climate.set_temperature
        target:
          entity_id:
            - climate.bedroom_ac
            - climate.bedroom_radiator
            - climate.bedroom_ventilation
        data:
          temperature: "{{ states('input_number.cozy_temperature') | float }}"

      - alias: Включаем увлажнитель
        continue_on_error: true
        service: script.turn_on
        target:
          entity_id: script.bedroom_humidifier_on

  focus:
    alias: Фокус
    description: Режим работы — яркий холодный свет, бодрящая температура
    icon: mdi:laptop
    sequence:
      - alias: Фиксируем режим
        service: input_select.select_option
        target:
          entity_id: input_select.home_mode
        data:
          option: focus

      - alias: Выключаем ночник
        continue_on_error: true
        service: light.turn_off
        target:
          entity_id: light.bedroom_nightlight

      - alias: Включаем яркий холодный свет
        continue_on_error: true
        service: script.bedroom_set_light_logical
        data:
          brightness_logical: "{{ states('input_number.focus_brightness') | int(90) }}"

      - alias: Открываем шторы — естественный свет
        continue_on_error: true
        service: cover.open_cover
        target:
          entity_id: cover.bedroom_curtains

      - alias: Устанавливаем рабочую температуру
        continue_on_error: true
        service: climate.set_temperature
        target:
          entity_id:
            - climate.bedroom_ac
            - climate.bedroom_radiator
            - climate.bedroom_ventilation
        data:
          temperature: "{{ states('input_number.focus_temperature') | float }}"
