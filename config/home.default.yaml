# Mapping: домен приложения → Home Assistant
# Редактируйте под свою установку HA
# TODO(SH-21): sync-скрипт home.default.yaml → apps/mobile/src/config/homeConfig.ts

# Сценарии — см. apps/mobile/src/features/scenarios/config/scenarios.ts (UI)
# HA-контракт entity_id: docs/scenarios-ha-contract.md
# Инсталляционный пакет: SH-24 (packages/ha-installer/)
scenarios:
  evening:
    label: Вечер
    script: script.evening
    icon: moon-o
    has_schedule: true
    default_schedule_time: "22:30"
  sleep:
    label: Сон
    script: script.sleep
    icon: bed
    has_schedule: true
    default_schedule_time: "23:00"
  morning:
    label: Утро
    script: script.morning
    icon: sun-o
    has_schedule: true
    default_schedule_time: "07:00"
  away:
    label: Уехали
    script: script.away
    icon: sign-out
    has_schedule: false
  coming_home:
    label: Еду домой
    script: script.coming_home
    icon: home
    has_schedule: false
  cozy:
    label: Уют
    script: script.cozy
    icon: coffee
    has_schedule: false
  focus:
    label: Фокус
    script: script.focus
    icon: laptop
    has_schedule: false

home_state:
  temperature:
    entity: sensor.living_room_temperature
  light_summary:
    entities:
      - light.living_room
      - light.bedroom
  security:
    entity: alarm_control_panel.home

bedroom_sensors:
  co2:
    entity: sensor.bedroom_co2
  temperature:
    entity: sensor.bedroom_temperature
  humidity:
    entity: sensor.bedroom_humidity

bedroom_devices:
  devices:
    - id: light
      label: Свет
      control: slider
      entity: light.bedroom
      slider:
        min: 0
        max: 100
        step: 1
    - id: air_conditioner
      label: Кондиционер
      control: slider
      entity: climate.bedroom_ac
      slider:
        min: 16
        max: 30
        step: 0.5
    - id: ventilation
      label: Приточка
      control: slider
      entity: climate.bedroom_ventilation
      slider:
        min: 16
        max: 28
        step: 0.5
    - id: radiator
      label: Радиатор
      control: slider
      entity: climate.bedroom_radiator
      slider:
        min: 16
        max: 28
        step: 0.5
    - id: curtains
      label: Шторы
      control: segmented
      entity: cover.bedroom_curtains
      segments:
        - id: open
          label: Открыты
          value: 100
        - id: half
          label: Наполовину
          value: 50
        - id: closed
          label: Закрыты
          value: 0
    - id: humidifier
      label: Увлажнитель
      control: toggle
      entity: humidifier.bedroom
    - id: window
      label: Окно
      control: segmented
      entity: cover.bedroom_window
      segments:
        - id: open
          label: Открыть
          value: 100
        - id: closed
          label: Закрыть
          value: 0

rooms:
  - id: living_room
    label: Гостиная
    area_id: living_room
    light: light.living_room
    climate: climate.living_room
  - id: bedroom
    label: Спальня
    area_id: bedroom
    light: light.bedroom

presence:
  persons:
    - entity: person.maria
      label: Мария
    - entity: person.partner
      label: Партнёр

timeline:
  entity_watch:
    - person.maria
    - input_select.home_mode

gentle_notifications:
  - id: bedroom_dark
    room_id: bedroom
    light_entity: light.bedroom
    occupancy_entity: binary_sensor.bedroom_occupancy
    message: Похоже, в спальне темно — включить свет?

# Сущности для active/prepared в приложении
scenarios_ha:
  home_mode:
    entity: input_select.home_mode
  prepared:
    entity: input_boolean.home_ready_for_arrival
  exit_home_mode_option: none
